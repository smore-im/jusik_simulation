<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>점검 중입니다</title>
<style>
  :root{
    --bg:#0A0E15;
    --card:#131A24;
    --row:#1B2331;
    --line:#232C3B;
    --text:#EDF0F5;
    --muted:#8B94A5;
    --orange:#F0A93E;
    --green:#3DDC84;
    --red:#FF6B6B;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", sans-serif;
    padding:40px 20px;
    overflow-x:hidden;
  }

  /* ── 배경에서 벽 튕기는 DVD 로고 ── */
  #bouncer{
    position:fixed;
    top:0; left:0;
    z-index:0;
    pointer-events:none;
    user-select:none;
    padding:10px 18px;
    border:2px solid currentColor;
    border-radius:10px;
    font-size:15px;
    font-weight:800;
    letter-spacing:.06em;
    color:var(--orange);
    opacity:.5;
    white-space:nowrap;
    will-change:transform;
  }
  #bouncer.corner{
    opacity:1;
    animation:cornerPop .6s ease-out;
  }
  @keyframes cornerPop{
    0%{transform:scale(1);}
    40%{transform:scale(1.35);}
    100%{transform:scale(1);}
  }

  .card{
    position:relative;
    z-index:1;
    width:100%;
    max-width:640px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:22px;
    padding:44px 40px 36px;
  }

  .maint-title{
    text-align:center;
    font-size:26px;
    font-weight:700;
    color:var(--orange);
    margin:0 0 14px;
  }
  .maint-sub{
    text-align:center;
    color:var(--muted);
    font-size:14.5px;
    line-height:1.7;
    margin:0 0 22px;
  }

  /* ── 남은 시간 카운트다운 ── */
  .countdown{
    text-align:center;
    background:var(--row);
    border:1px solid var(--line);
    border-radius:14px;
    padding:20px 16px 18px;
    margin-bottom:10px;
  }
  .countdown .cd-label{
    display:block;
    color:var(--muted);
    font-size:13px;
    margin-bottom:8px;
  }
  .countdown .cd-time{
    display:block;
    font-size:36px;
    font-weight:800;
    line-height:1;
    letter-spacing:.01em;
    font-variant-numeric:tabular-nums;
    color:var(--orange);
  }
  .countdown.open{
    border-color:var(--green);
  }
  .countdown.open .cd-time{color:var(--green);}
  .countdown .cd-note{
    display:block;
    color:var(--muted);
    font-size:12.5px;
    margin-top:10px;
  }

  /* ── 재오픈 시간 ── */
  .schedule{
    background:var(--row);
    border:1px solid var(--line);
    border-radius:14px;
    padding:18px 20px;
    margin-bottom:16px;
  }
  .schedule h3{
    font-size:13px;
    font-weight:700;
    color:var(--orange);
    margin:0 0 12px;
    letter-spacing:.02em;
  }
  .slot{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:12px;
    padding:7px 0;
    font-size:15px;
    color:var(--muted);
  }
  .slot + .slot{
    border-top:1px solid var(--line);
  }
  .slot .time{
    font-weight:700;
    font-variant-numeric:tabular-nums;
    letter-spacing:.01em;
  }
  .slot .when{
    font-size:13px;
  }
  .slot.target{
    color:var(--text);
  }
  .slot.target .time{
    color:var(--orange);
  }
  .slot.target.now .time{
    color:var(--green);
  }

  /* ── 참여자 수 ── */
  .stat{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    background:var(--row);
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px;
    margin-bottom:34px;
  }
  .stat .label{
    color:var(--muted);
    font-size:14px;
  }
  .stat .value{
    font-size:22px;
    font-weight:800;
    color:var(--orange);
    font-variant-numeric:tabular-nums;
  }
  .stat .unit{
    font-size:14px;
    font-weight:600;
    color:var(--muted);
  }

  .board-head{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom:18px;
  }
  .board-head h2{
    font-size:16.5px;
    font-weight:700;
    margin:0;
    color:var(--text);
  }
  .live{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:12px;
    font-weight:700;
    color:var(--green);
    letter-spacing:.02em;
  }
  .live .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--green);
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1; box-shadow:0 0 0 0 rgba(61,220,132,.5);}
    50%{opacity:.5; box-shadow:0 0 0 5px rgba(61,220,132,0);}
  }

  #rankList{margin-bottom:14px;}
  #rankList.expanded{
    max-height:320px;
    overflow-y:auto;
    padding-right:4px;
  }
  #rankList.expanded::-webkit-scrollbar{width:6px;}
  #rankList.expanded::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}

  .rank-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--row);
    border:1px solid transparent;
    border-radius:12px;
    padding:15px 20px;
    margin-bottom:10px;
    font-size:15.5px;
  }
  .rank-row.gold{
    border-color:var(--orange);
  }
  .rank-row .who{
    font-weight:600;
  }
  .rank-row .who .medal{
    margin-right:2px;
  }
  .rank-row .pct{
    font-weight:700;
    font-variant-numeric:tabular-nums;
  }
  .up{color:var(--green);}
  .down{color:var(--red);}

  .toggle-btn{
    display:block;
    width:100%;
    background:transparent;
    border:1px solid var(--line);
    border-radius:12px;
    color:var(--muted);
    font-family:inherit;
    font-size:13.5px;
    font-weight:600;
    padding:12px;
    margin-bottom:16px;
    cursor:pointer;
    transition:border-color .15s, color .15s;
  }
  .toggle-btn:hover{border-color:var(--orange);color:var(--orange);}
  .toggle-btn:focus-visible{outline:2px solid var(--orange);outline-offset:2px;}
  .toggle-btn[hidden]{display:none;}

  .skeleton{
    height:52px;
    border-radius:12px;
    margin-bottom:10px;
    background:linear-gradient(90deg, var(--row) 0%, #232c3b 50%, var(--row) 100%);
    background-size:200% 100%;
    animation:shimmer 1.4s ease-in-out infinite;
  }
  @keyframes shimmer{
    0%{background-position:200% 0;}
    100%{background-position:-200% 0;}
  }

  .state-msg{
    text-align:center;
    color:var(--muted);
    font-size:14px;
    padding:24px 10px;
  }
  .state-msg.err{color:var(--red);}

  .caption{
    text-align:center;
    color:var(--muted);
    font-size:12.5px;
    margin:0;
  }

  /* ── 리뷰 / 피드백 ── */
  .divider{
    height:1px;
    background:var(--line);
    margin:32px 0 26px;
  }
  .fb-head{
    font-size:16.5px;
    font-weight:700;
    margin:0 0 6px;
  }
  .fb-desc{
    color:var(--muted);
    font-size:13.5px;
    line-height:1.6;
    margin:0 0 18px;
  }
  .stars{
    display:flex;
    gap:6px;
    margin-bottom:14px;
  }
  .star{
    background:transparent;
    border:none;
    padding:2px;
    font-size:26px;
    line-height:1;
    cursor:pointer;
    color:var(--line);
    transition:color .12s, transform .12s;
  }
  .star:hover{transform:scale(1.12);}
  .star.on{color:var(--orange);}
  .star:focus-visible{outline:2px solid var(--orange);outline-offset:2px;border-radius:4px;}

  .field{
    width:100%;
    background:var(--row);
    border:1px solid var(--line);
    border-radius:12px;
    color:var(--text);
    font-family:inherit;
    font-size:14.5px;
    padding:13px 15px;
    margin-bottom:10px;
    transition:border-color .15s;
  }
  .field::placeholder{color:var(--muted);}
  .field:focus{outline:none;border-color:var(--orange);}
  textarea.field{min-height:96px;resize:vertical;line-height:1.6;}

  .fb-bottom{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .counter{
    color:var(--muted);
    font-size:12.5px;
    font-variant-numeric:tabular-nums;
  }
  .submit-btn{
    background:var(--orange);
    border:none;
    border-radius:12px;
    color:#0A0E15;
    font-family:inherit;
    font-size:14.5px;
    font-weight:700;
    padding:12px 24px;
    cursor:pointer;
    transition:opacity .15s;
  }
  .submit-btn:hover{opacity:.88;}
  .submit-btn:disabled{opacity:.4;cursor:not-allowed;}
  .submit-btn:focus-visible{outline:2px solid var(--orange);outline-offset:3px;}

  .fb-msg{
    font-size:13.5px;
    margin:12px 0 0;
    min-height:18px;
  }
  .fb-msg.ok{color:var(--green);}
  .fb-msg.err{color:var(--red);}

  .fb-done{
    text-align:center;
    background:var(--row);
    border:1px solid var(--green);
    border-radius:14px;
    padding:26px 20px;
  }
  .fb-done p{margin:0;font-size:14.5px;}
  .fb-done .again{
    background:transparent;
    border:none;
    color:var(--muted);
    font-family:inherit;
    font-size:13px;
    text-decoration:underline;
    cursor:pointer;
    margin-top:10px;
    padding:4px;
  }

  @media (max-width:480px){
    .card{padding:34px 22px 28px;}
    #bouncer{font-size:12px;padding:7px 12px;}
  }

  @media (prefers-reduced-motion: reduce){
    .live .dot, .skeleton, #bouncer.corner{animation:none;}
  }
</style>
</head>
<body>

<div id="bouncer">모의투자 배틀</div>

<div class="card">
  <p class="maint-title">🔧 점검 중입니다</p>
  <p class="maint-sub">현재 모의투자 배틀을 점검 중입니다.<br>쉬는 시간에 다시 열립니다.</p>

  <div class="countdown" id="countdown">
    <span class="cd-label" id="cdLabel">다시 열리기까지</span>
    <span class="cd-time" id="cdTime">--:--:--</span>
    <span class="cd-note" id="cdNote"></span>
  </div>

  <div class="schedule">
    <h3>다시 열리는 시간</h3>
    <div class="slot" data-slot="0">
      <span class="time">15:20 – 15:30</span>
      <span class="when">쉬는 시간</span>
    </div>
    <div class="slot" data-slot="1">
      <span class="time">16:30 – 23:00</span>
      <span class="when">방과 후</span>
    </div>
  </div>

  <div class="stat">
    <span class="label">지금까지 참여한 사람</span>
    <span class="value" id="playerCount">–</span>
    <span class="unit">명</span>
  </div>

  <div class="board-head">
    <h2>🏆 실시간 순위표</h2>
    <span class="live"><span class="dot"></span>LIVE</span>
  </div>

  <div id="rankList">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>

  <button class="toggle-btn" id="toggleBtn" hidden>전체 보기</button>

  <p class="caption" id="caption">순위는 마지막 집계 기준입니다.</p>

  <div class="divider"></div>

  <div id="fbForm">
    <h2 class="fb-head">✍️ 리뷰 남기기</h2>
    <p class="fb-desc">써 보고 느낀 점을 남겨 주세요. 다음 업데이트에 반영합니다.</p>

    <div class="stars" id="stars" role="group" aria-label="별점">
      <button class="star" data-v="1" aria-label="별 1개">★</button>
      <button class="star" data-v="2" aria-label="별 2개">★</button>
      <button class="star" data-v="3" aria-label="별 3개">★</button>
      <button class="star" data-v="4" aria-label="별 4개">★</button>
      <button class="star" data-v="5" aria-label="별 5개">★</button>
    </div>

    <input class="field" id="fbName" type="text" maxlength="12" placeholder="이름 (안 써도 됩니다)">
    <textarea class="field" id="fbText" maxlength="300" placeholder="좋았던 점, 불편했던 점, 이런 게 있었으면 하는 것"></textarea>

    <div class="fb-bottom">
      <span class="counter" id="counter">0 / 300</span>
      <button class="submit-btn" id="fbSubmit">보내기</button>
    </div>

    <p class="fb-msg" id="fbMsg"></p>
  </div>

  <div class="fb-done" id="fbDone" hidden>
    <p>리뷰를 보냈습니다. 고맙습니다 🙌</p>
    <button class="again" id="fbAgain">하나 더 남기기</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
// jusik.html의 FIREBASE_CONFIG와 동일한 값 — 같은 프로젝트(jusik-66f8f)를 그대로 읽어옵니다.
const firebaseConfig = {
  apiKey: "AIzaSyC87Zhrpi78xHIKZQRk9Bgth4ZfW3ekAJA",
  authDomain: "jusik-66f8f.firebaseapp.com",
  projectId: "jusik-66f8f",
  storageBucket: "jusik-66f8f.firebasestorage.app",
  messagingSenderId: "479564586578",
  appId: "1:479564586578:web:5f7fc5b3854b05589c498b",
  measurementId: "G-CFC5TC2H16"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const RANK_TOP_N = 5;

let allRows = [];      // 전체 순위 (정렬 완료)
let expanded = false;  // 전체 보기 상태

function pct(n){
  return (n>=0?"+":"") + n.toFixed(2) + "%";
}
function escapeHTML(s){
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;',
      '"':'&quot;',"'":'&#39;'}[c]));
}

function rankRowHTML(r,i){
  const medal=["🥇","🥈","🥉"];
  const dir = r.returnPct>=0 ? "up" : "down";
  return `
    <div class="rank-row ${i===0?'gold':''}">
      <span class="who">${i<3 ? `<span class="medal">${medal[i]}</span>` : (i+1)+"위 "}${escapeHTML(r.name)}</span>
      <span class="pct ${dir}">${pct(r.returnPct)}</span>
    </div>
  `;
}

function renderList(){
  const list = document.getElementById("rankList");
  const caption = document.getElementById("caption");
  const toggle = document.getElementById("toggleBtn");

  if(!allRows.length){
    list.classList.remove("expanded");
    list.innerHTML = `<div class="state-msg">아직 기록이 없습니다.</div>`;
    caption.textContent = "첫 번째 도전자를 기다리는 중입니다.";
    toggle.hidden = true;
    return;
  }

  const rows = expanded ? allRows : allRows.slice(0, RANK_TOP_N);
  list.innerHTML = rows.map((r,i)=>rankRowHTML(r,i)).join("");
  list.classList.toggle("expanded", expanded);

  if(allRows.length > RANK_TOP_N){
    toggle.hidden = false;
    toggle.textContent = expanded
      ? "접기"
      : `전체 보기 (${allRows.length}명)`;
  }else{
    toggle.hidden = true;
  }

  caption.textContent = expanded
    ? `전체 ${allRows.length}명 · 순위는 마지막 집계 기준입니다.`
    : "순위는 마지막 집계 기준입니다.";
}

function renderCount(n){
  document.getElementById("playerCount").textContent = n.toLocaleString("ko-KR");
}

function renderError(msg){
  document.getElementById("rankList").innerHTML =
    `<div class="state-msg err">순위를 불러오지 못했습니다.${msg ? "<br>"+escapeHTML(msg) : ""}<br>잠시 후 자동으로 다시 시도합니다.</div>`;
  document.getElementById("toggleBtn").hidden = true;
}

document.getElementById("toggleBtn").addEventListener("click", ()=>{
  expanded = !expanded;
  renderList();
});

function subscribeRankBoard(){
  // users 컬렉션의 문서 자체에 bestReturnPct / name 필드가 직접 들어있는 구조
  // (users/{studentId} → bestReturnPct, name, ... / 서브컬렉션 plays는 개별 판 기록)
  db.collection("users")
    .orderBy("bestReturnPct","desc")
    .limit(500)
    .onSnapshot(
      (snap) => {
        const rows = [];
        snap.forEach(d=>{
          const v = d.data();
          if(typeof v.bestReturnPct === "number" && v.name){
            rows.push({
              name: v.name,
              returnPct: v.bestReturnPct
            });
          }
        });
        allRows = rows;
        renderCount(rows.length);
        renderList();
      },
      (err) => {
        console.error(err);
        // 가장 흔한 원인: Firestore 보안 규칙이 읽기를 막고 있는 경우 (permission-denied)
        renderError(err.code === "permission-denied" ? "읽기 권한이 없습니다 (보안 규칙 확인 필요)" : "");
        document.getElementById("playerCount").textContent = "–";
      }
    );
}

subscribeRankBoard();


/* ───────── 리뷰 / 피드백 ───────── */
let rating = 0;

const starEls  = [...document.querySelectorAll(".star")];
const fbText   = document.getElementById("fbText");
const fbName   = document.getElementById("fbName");
const fbMsg    = document.getElementById("fbMsg");
const fbSubmit = document.getElementById("fbSubmit");
const counter  = document.getElementById("counter");

function paintStars(v){
  starEls.forEach(el => el.classList.toggle("on", Number(el.dataset.v) <= v));
}
starEls.forEach(el=>{
  el.addEventListener("click", ()=>{
    rating = Number(el.dataset.v);
    paintStars(rating);
    fbMsg.textContent = "";
  });
  el.addEventListener("mouseenter", ()=> paintStars(Number(el.dataset.v)));
});
document.getElementById("stars").addEventListener("mouseleave", ()=> paintStars(rating));

fbText.addEventListener("input", ()=>{
  counter.textContent = `${fbText.value.length} / 300`;
});

function setMsg(text, kind){
  fbMsg.textContent = text;
  fbMsg.className = "fb-msg" + (kind ? " "+kind : "");
}

fbSubmit.addEventListener("click", async ()=>{
  const text = fbText.value.trim();

  if(!rating){
    setMsg("별점을 먼저 선택해 주세요.", "err");
    return;
  }
  if(text.length < 2){
    setMsg("내용을 두 글자 이상 적어 주세요.", "err");
    return;
  }

  fbSubmit.disabled = true;
  setMsg("보내는 중…", "");

  try{
    await db.collection("feedback").add({
      name: fbName.value.trim() || "익명",
      rating: rating,
      text: text,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      userAgent: navigator.userAgent.slice(0,180)
    });
    document.getElementById("fbForm").hidden = true;
    document.getElementById("fbDone").hidden = false;
  }catch(err){
    console.error(err);
    setMsg(
      err.code === "permission-denied"
        ? "저장 권한이 없습니다 (feedback 컬렉션 쓰기 규칙을 확인해 주세요)."
        : "보내지 못했습니다. 잠시 후 다시 시도해 주세요.",
      "err"
    );
    fbSubmit.disabled = false;
  }
});

document.getElementById("fbAgain").addEventListener("click", ()=>{
  rating = 0;
  paintStars(0);
  fbText.value = "";
  fbName.value = "";
  counter.textContent = "0 / 300";
  setMsg("", "");
  fbSubmit.disabled = false;
  document.getElementById("fbDone").hidden = true;
  document.getElementById("fbForm").hidden = false;
});


/* ───────── 남은 시간 카운트다운 ───────── */
(function(){
  // [여는 시각, 닫는 시각] — 분 단위, 시간표 마크업의 data-slot 순서와 같음
  const WINDOWS = [
    { open: 15*60 + 20, close: 15*60 + 30 },  // 15:20 – 15:30
    { open: 16*60 + 30, close: 23*60 +  0 }   // 16:30 – 23:00
  ];

  const box   = document.getElementById("countdown");
  const label = document.getElementById("cdLabel");
  const time  = document.getElementById("cdTime");
  const note  = document.getElementById("cdNote");
  const slots = [...document.querySelectorAll(".slot")];

  // 오늘/내일 기준의 실제 Date로 변환 (자정 넘어가도 정확)
  function at(dayOffset, minutes){
    const d = new Date();
    d.setDate(d.getDate() + dayOffset);
    d.setHours(0, minutes, 0, 0);
    return d;
  }

  function fmt(ms){
    const t = Math.max(0, Math.floor(ms/1000));
    const h = Math.floor(t/3600);
    const m = Math.floor((t%3600)/60);
    const s = t%60;
    const p = n => String(n).padStart(2,"0");
    return h > 0 ? `${p(h)}:${p(m)}:${p(s)}` : `${p(m)}:${p(s)}`;
  }

  function status(){
    const now = new Date();
    for(let i=0; i<WINDOWS.length; i++){
      const o = at(0, WINDOWS[i].open);
      const c = at(0, WINDOWS[i].close);
      if(now >= o && now < c) return { open:true,  target:c, slot:i };
      if(now < o)             return { open:false, target:o, slot:i };
    }
    // 오늘 일정이 다 끝남 → 내일 첫 타임
    return { open:false, target: at(1, WINDOWS[0].open), slot:0 };
  }

  function tick(){
    const st = status();

    box.classList.toggle("open", st.open);
    label.textContent = st.open ? "지금 열려 있어요 · 닫히기까지" : "다시 열리기까지";
    time.textContent  = fmt(st.target - new Date());
    note.textContent  = st.open
      ? "지금 바로 들어올 수 있습니다."
      : "이 페이지는 자동으로 갱신되지 않습니다. 시간이 되면 새로고침 해 주세요.";

    slots.forEach((el, i) => {
      el.classList.toggle("target", i === st.slot);
      el.classList.toggle("now", i === st.slot && st.open);
    });
  }

  tick();
  setInterval(tick, 1000);
})();


/* ───────── 벽 튕기는 DVD 로고 ───────── */
(function(){
  const el = document.getElementById("bouncer");
  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if(reduce){ el.style.display = "none"; return; }

  const COLORS = ["#F0A93E","#3DDC84","#FF6B6B","#5AA9FF","#C77DFF","#FFD93D"];
  let ci = 0;

  let x = Math.random() * 200 + 40;
  let y = Math.random() * 200 + 40;
  let vx = 1.5, vy = 1.2;
  let w = el.offsetWidth, h = el.offsetHeight;

  window.addEventListener("resize", ()=>{ w = el.offsetWidth; h = el.offsetHeight; });

  function nextColor(){
    ci = (ci + 1) % COLORS.length;
    el.style.color = COLORS[ci];
  }

  function step(){
    const W = window.innerWidth, H = window.innerHeight;
    x += vx; y += vy;

    let hitX = false, hitY = false;

    if(x <= 0){ x = 0; vx = Math.abs(vx); hitX = true; }
    else if(x + w >= W){ x = W - w; vx = -Math.abs(vx); hitX = true; }

    if(y <= 0){ y = 0; vy = Math.abs(vy); hitY = true; }
    else if(y + h >= H){ y = H - h; vy = -Math.abs(vy); hitY = true; }

    if(hitX || hitY) nextColor();

    // 모서리 정타 — 이거 보면 그날 운 좋은 겁니다
    if(hitX && hitY){
      el.classList.remove("corner");
      void el.offsetWidth;
      el.classList.add("corner");
    }

    el.style.transform = `translate(${x}px, ${y}px)`;
    requestAnimationFrame(step);
  }

  requestAnimationFrame(step);
})();
</script>
