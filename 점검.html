<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>점검 중입니다</title>
<style>
  :root{
    --bg:#0A0E15;
    --card:#131A24;
    --row:#1B2331;
    --line:#232C3B;
    --text:#EDF0F5;
    --muted:#8B94A5;
    --orange:#F0A93E;
    --green:#3DDC84;
    --red:#FF6B6B;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", sans-serif;
    padding:40px 20px;
  }

  .card{
    width:100%;
    max-width:640px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:22px;
    padding:44px 40px 36px;
  }

  .maint-title{
    text-align:center;
    font-size:26px;
    font-weight:700;
    color:var(--orange);
    margin:0 0 14px;
  }
  .maint-sub{
    text-align:center;
    color:var(--muted);
    font-size:14.5px;
    line-height:1.7;
    margin:0 0 34px;
  }

  .board-head{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom:18px;
  }
  .board-head h2{
    font-size:16.5px;
    font-weight:700;
    margin:0;
    color:var(--text);
  }
  .live{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:12px;
    font-weight:700;
    color:var(--green);
    letter-spacing:.02em;
  }
  .live .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--green);
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1; box-shadow:0 0 0 0 rgba(61,220,132,.5);}
    50%{opacity:.5; box-shadow:0 0 0 5px rgba(61,220,132,0);}
  }

  #rankList{margin-bottom:18px;}
  .rank-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--row);
    border:1px solid transparent;
    border-radius:12px;
    padding:15px 20px;
    margin-bottom:10px;
    font-size:15.5px;
  }
  .rank-row.gold{
    border-color:var(--orange);
  }
  .rank-row .who{
    font-weight:600;
  }
  .rank-row .who .medal{
    margin-right:2px;
  }
  .rank-row .pct{
    font-weight:700;
    font-variant-numeric:tabular-nums;
  }
  .up{color:var(--green);}
  .down{color:var(--red);}

  .skeleton{
    height:52px;
    border-radius:12px;
    margin-bottom:10px;
    background:linear-gradient(90deg, var(--row) 0%, #232c3b 50%, var(--row) 100%);
    background-size:200% 100%;
    animation:shimmer 1.4s ease-in-out infinite;
  }
  @keyframes shimmer{
    0%{background-position:200% 0;}
    100%{background-position:-200% 0;}
  }

  .state-msg{
    text-align:center;
    color:var(--muted);
    font-size:14px;
    padding:24px 10px;
  }
  .state-msg.err{color:var(--red);}

  .caption{
    text-align:center;
    color:var(--muted);
    font-size:12.5px;
    margin:0;
  }

  @media (prefers-reduced-motion: reduce){
    .live .dot, .skeleton{animation:none;}
  }
</style>
</head>
<body>

<div class="card">
  <p class="maint-title">🔧 점검 중입니다</p>
  <p class="maint-sub">현재 모의투자 배틀을 점검 중입니다.<br>잠시 후 다시 이용해 주세요.</p>

  <div class="board-head">
    <h2>🏆 실시간 순위표</h2>
    <span class="live"><span class="dot"></span>LIVE</span>
  </div>

  <div id="rankList">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>

  <p class="caption" id="caption">순위는 마지막 집계 기준입니다.</p>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
// jusik.html의 FIREBASE_CONFIG와 동일한 값 — 같은 프로젝트(jusik-66f8f)를 그대로 읽어옵니다.
const firebaseConfig = {
  apiKey: "AIzaSyC87Zhrpi78xHIKZQRk9Bgth4ZfW3ekAJA",
  authDomain: "jusik-66f8f.firebaseapp.com",
  projectId: "jusik-66f8f",
  storageBucket: "jusik-66f8f.firebasestorage.app",
  messagingSenderId: "479564586578",
  appId: "1:479564586578:web:5f7fc5b3854b05589c498b",
  measurementId: "G-CFC5TC2H16"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const RANK_TOP_N = 5;

function pct(n){
  return (n>=0?"+":"") + n.toFixed(2) + "%";
}
function escapeHTML(s){
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;',
      '"':'&quot;',"'":'&#39;'}[c]));
}

function rankRowHTML(r,i){
  const medal=["🥇","🥈","🥉"];
  const dir = r.returnPct>=0 ? "up" : "down";
  return `
    <div class="rank-row ${i===0?'gold':''}">
      <span class="who">${i<3 ? `<span class="medal">${medal[i]}</span>` : (i+1)+"위 "}${escapeHTML(r.name)}</span>
      <span class="pct ${dir}">${pct(r.returnPct)}</span>
    </div>
  `;
}

function renderList(rows){
  const list = document.getElementById("rankList");
  const caption = document.getElementById("caption");

  if(!rows.length){
    list.innerHTML = `<div class="state-msg">아직 기록이 없습니다.</div>`;
    caption.textContent = "첫 번째 도전자를 기다리는 중입니다.";
    return;
  }

  list.innerHTML = rows.map((r,i)=>rankRowHTML(r,i)).join("");
  caption.textContent = "순위는 마지막 집계 기준입니다.";
}

function renderError(msg){
  document.getElementById("rankList").innerHTML =
    `<div class="state-msg err">순위를 불러오지 못했습니다.${msg ? "<br>"+escapeHTML(msg) : ""}<br>잠시 후 자동으로 다시 시도합니다.</div>`;
}

function subscribeRankBoard(){
  // users 컬렉션의 문서 자체에 bestReturnPct / name 필드가 직접 들어있는 구조
  // (users/{studentId} → bestReturnPct, name, ... / 서브컬렉션 plays는 개별 판 기록)
  db.collection("users")
    .orderBy("bestReturnPct","desc")
    .limit(200)
    .onSnapshot(
      (snap) => {
        let rows = [];
        snap.forEach(d=>{
          const v = d.data();
          if(typeof v.bestReturnPct === "number" && v.name){
            rows.push({
              name: v.name,
              returnPct: v.bestReturnPct
            });
          }
        });
        rows = rows.slice(0, RANK_TOP_N);
        renderList(rows);
      },
      (err) => {
        console.error(err);
        // 가장 흔한 원인: Firestore 보안 규칙이 읽기를 막고 있는 경우 (permission-denied)
        renderError(err.code === "permission-denied" ? "읽기 권한이 없습니다 (보안 규칙 확인 필요)" : "");
      }
    );
}

subscribeRankBoard();
</script>
</body>
</html>
