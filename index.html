            height: 100vh;
            display: flex;

            font-family: "Pretendard", "Apple SD Gothic Neo", sans-serif;

        .container {
            text-align: center;
            padding: 40px;
        }

<body>
    <div class="container">
        <h1>🔧 시스템 점검 중입니다.</h1>
        <p>보다 원활한 서비스를 위해 잠시 점검을 진행하고 있습니다.</p>
        <p>잠시 후 다시 이용해 주세요.</p>
    </div>
</body>
</html>
